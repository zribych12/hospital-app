<div class="flex">
  <app-sidebar />

  <main class="ml-64 flex-1 p-8 min-h-screen">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Dashboard Administrateur</h1>
      <p class="text-gray-500 mt-1">Vue d'ensemble du système</p>
    </div>

    @if (loading()) {
      <div class="flex items-center justify-center h-64">
        <div class="text-center">
          <svg class="animate-spin w-8 h-8 text-primary-600 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <p class="text-gray-500">Chargement...</p>
        </div>
      </div>
    } @else if (stats()) {
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <app-stat-card
          label="Médecins actifs"
          [value]="stats()!.medecinActifs"
          icon="👨‍⚕️"
          iconBg="bg-blue-100"
          [subtitle]="stats()!.medecinInactifs + ' inactifs'"
        />
        <app-stat-card
          label="Total médecins"
          [value]="stats()!.totalMedecins"
          icon="🏥"
          iconBg="bg-primary-100"
        />
        <app-stat-card
          label="Patients enregistrés"
          [value]="stats()!.totalPatients"
          icon="👥"
          iconBg="bg-green-100"
        />
        <app-stat-card
          label="RDV ce mois"
          [value]="stats()!.rdvCeMois"
          icon="📅"
          iconBg="bg-purple-100"
        />
      </div>

      <!-- Actions rapides -->
      <div class="card">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Actions rapides</h2>
        <div class="flex flex-wrap gap-3">
          <a routerLink="/admin/medecins" class="btn-primary">
            👨‍⚕️ Gérer les médecins
          </a>
          <a routerLink="/admin/patients" class="btn-secondary">
            🗂️ Voir les patients
          </a>
        </div>
      </div>
    }
  </main>
</div>
